<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eduardo Vázquez</title>
  <link rel="icon" type="image/png" href="/img/logo/logo-x.png" />
  <link rel="stylesheet" href="/src/css/base/main.css" />
  <link rel="stylesheet" href="/src/css/components/nav.css" />
  <link rel="stylesheet" href="/src/css/pages/experiencia.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script type="module">
    import { initProtection, triggerShare } from '/src/js/utils/protection.js';
    initProtection();
    window.triggerShare = triggerShare;
  </script>
  <style>
    .share-btn {
      position: fixed;
      top: 1rem;
      left: 1rem;
      background: #111;
      border: 1px solid var(--accent-color);
      color: var(--accent-color);
      font-size: 1.3rem;
      padding: 0.6rem 0.7rem;
      border-radius: 50%;
      cursor: pointer;
      z-index: 1001;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .share-btn:hover {
      transform: scale(1.2) rotate(20deg);
      box-shadow: 0 0 12px var(--accent-glow);
    }
  </style>
</head>
<body>
  <div id="loader-wrapper">
    <div class="loader-aurora"></div>
    <div class="spinner"></div>
  </div>

  <div class="aurora-bg"></div>

  <button class="share-btn" title="Compartir Perfil">
    <i class="fas fa-arrow-up-from-bracket"></i>
  </button>

  <div class="container" style="max-width: 900px; margin: 0 auto; padding: 4rem 1rem 8rem;">
    <header style="text-align: center; margin-bottom: 4rem;">
      <h1 style="font-size: 2.5rem; color: var(--accent-color);">Trayectoria Profesional</h1>
      <p style="color: var(--text-secondary);">Un recorrido por mis proyectos y roles técnicos.</p>
    </header>

    <div id="experience-container" class="timeline"></div>

    <div style="margin-top: 4rem; text-align: center;">
      <a href="/cv/" class="btn-primary">
        <i class="fas fa-file-pdf"></i> Ver Currículum Completo (PDF)
      </a>
    </div>
  </div>

  <nav class="glass floating-nav">
    <a href="/" class="nav-link"><i class="fas fa-home"></i><span>Inicio</span></a>
    <a href="/experiencia/" class="nav-link active"><i class="fas fa-history"></i><span>Experiencia</span></a>
    <a href="/portafolio/" class="nav-link"><i class="fas fa-th-large"></i><span>Portafolio</span></a>
  </nav>

  <footer>
    <div style="text-align: center; padding: 0 0 8rem; color: var(--text-secondary); font-size: 0.8rem;">
      © <span id="year"></span> Eduardo Vázquez
    </div>
  </footer>

  <script type="module">
    import { loadExperience } from '/src/js/pages/experiencia.js';
    
    window.addEventListener("load", () => {
      const loader = document.getElementById("loader-wrapper");
      loader.style.opacity = "0";
      setTimeout(() => loader.style.visibility = "hidden", 800);
      loadExperience();
    });
    document.getElementById("year").textContent = new Date().getFullYear();
    document.querySelector('.share-btn').addEventListener('click', () => {
      window.triggerShare();
    });
  </script>
</body>
</html>
