<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error 404 | Eduardo Vázquez</title>
  <link rel="icon" type="image/png" href="assets/img/logo/logo-x.png" />
  <meta http-equiv="refresh" content="5;url=/" />
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/base/index.css" />
  <link rel="stylesheet" href="assets/css/pages/404.css" />
</head>
<body>
  <div class="aurora-bg"></div>

  <div class="error">404</div>
  <div class="message">¿Estás perdido, hacker?</div>
  <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Volver al inicio</a>

  <script>
    window.addEventListener("load", () => {
      const loader = document.getElementById("loader");
      if (loader) {
        loader.style.opacity = 0;
        setTimeout(() => loader.style.display = "none", 500);
      }
    });
  </script>
</body>
</html>
