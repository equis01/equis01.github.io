<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Eduardo Vázquez</title>
  <link rel="icon" type="image/png" href="/img/logo/logo-x.png" />
  <link rel="stylesheet" href="/src/css/base/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .error-code {
      font-size: 8rem;
      font-weight: 800;
      color: var(--accent-color);
      margin-bottom: 0;
      line-height: 1;
      text-shadow: 0 0 30px var(--accent-glow);
    }

    .error-msg {
      font-size: 1.5rem;
      color: var(--text-primary);
      margin-bottom: 2rem;
    }

    .error-sub {
      color: var(--text-secondary);
      margin-bottom: 3rem;
      max-width: 400px;
    }
  </style>
</head>

<body>
  <div class="aurora-bg"></div>

  <h1 class="error-code">404</h1>
  <p class="error-msg">¿Estás perdido, hacker? 🤠</p>
  <p class="error-sub">La página que buscas no existe o ha sido movida a otra dimensión.</p>

  <a href="/" class="btn-primary">
    <i class="fas fa-home"></i> Volver al inicio
  </a>

  <script type="module">
    import { initProtection } from '/src/js/utils/protection.js';
    initProtection();
  </script>
</body>

</html>
