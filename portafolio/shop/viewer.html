<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eduardo Vázquez</title>
  <link rel="icon" type="image/png" href="/img/logo/logo-x.png" />
  <link rel="stylesheet" href="/src/css/base/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body { overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
    .viewer-header {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      border-bottom: 1px solid var(--glass-border);
      z-index: 10;
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(15px);
    }
    iframe { flex-grow: 1; border: none; width: 100%; height: 100%; }
    
    .buy-actions { display: flex; align-items: center; gap: 0.8rem; }

    /* Selector Estilizado */
    select#buy-options {
      background: #111;
      color: #fff;
      border: 1px solid var(--glass-border);
      padding: 0.6rem 1rem;
      border-radius: 8px;
      outline: none;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.3s;
    }
    select#buy-options:hover { border-color: var(--accent-color); }
    select#buy-options option { background: #111; color: #fff; padding: 10px; }

    .btn-contact {
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      font-size: 0.9rem;
      transition: 0.3s;
    }
    .btn-wa { background: #25D366; color: white; }
    .btn-wa:hover { background: #1eb954; box-shadow: 0 0 15px rgba(37, 211, 102, 0.4); }
    
    .btn-mail { background: var(--accent-color); color: #000; }
    .btn-mail:hover { opacity: 0.9; box-shadow: 0 0 15px var(--accent-glow); }

    @media (max-width: 768px) {
      .viewer-header { height: auto; padding: 1rem; flex-direction: column; gap: 1rem; }
      .buy-actions { width: 100%; flex-wrap: wrap; justify-content: center; }
      select#buy-options { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="viewer-header">
    <a href="/portafolio/shop/" style="color: var(--text-secondary); text-decoration: none;"><i class="fas fa-arrow-left"></i> Volver</a>
    
    <div class="buy-actions">
      <select id="buy-options">
        <!-- Opciones dinámicas -->
      </select>
      
      <a id="buy-wa-btn" href="#" target="_blank" class="btn-contact btn-wa">
        <i class="fab fa-whatsapp"></i> WhatsApp
      </a>
      
      <a id="buy-mail-btn" href="#" class="btn-contact btn-mail">
        <i class="fas fa-envelope"></i> Correo
      </a>
    </div>
  </div>

  <iframe id="preview-frame" src="about:blank"></iframe>

  <script type="module">
    import { initProtection } from '/src/js/utils/protection.js';
    initProtection();

    const params = new URLSearchParams(window.location.search);
    const hash = params.get('t');

    async function init() {
      if (!hash) { window.location.href = '/portafolio/shop/'; return; }
      
      const templateId = atob(hash); 
      const response = await fetch('/src/data/templates.json');
      const templates = await response.json();
      const template = templates.find(t => t.id === templateId);

      if (template) {
        document.getElementById('preview-frame').src = template.preview_url;
        const select = document.getElementById('buy-options');
        template.opciones.forEach(opt => {
          const o = document.createElement('option');
          // Asegurar que diga MXN si no lo dice
          const optText = opt.includes('MXN') ? opt : opt + ' MXN';
          o.value = optText;
          o.textContent = optText;
          select.appendChild(o);
        });

        const updateLinks = () => {
          const selectedOpt = select.value;
          const waNumber = "52442191619";
          const myEmail = "luis@evamtz.me";
          
          const subject = `Interés en Plantilla: ${template.nombre}`;
          const body = `Hola Eduardo, me interesa adquirir la plantilla "${template.nombre}".\n\nOpción seleccionada: ${selectedOpt}\n\n¿Podemos coordinar los detalles?`;
          
          // WhatsApp (Sin correo en el mensaje)
          document.getElementById('buy-wa-btn').href = `https://wa.me/${waNumber}?text=${encodeURIComponent(body)}`;
          
          // Mail
          document.getElementById('buy-mail-btn').href = `mailto:${myEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        };

        select.onchange = updateLinks;
        updateLinks();
      } else {
        window.location.href = '/portafolio/shop/';
      }
    }
    init();
  </script>
</body>
</html>
