<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eduardo Vázquez</title>
  <link rel="icon" type="image/png" href="/img/logo/logo-x.png" />
  <link rel="stylesheet" href="/src/css/base/main.css" />
  <link rel="stylesheet" href="/src/css/components/nav.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .portfolio-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 4rem 2rem 8rem;
    }
    .section-title {
      margin-bottom: 3rem;
      border-left: 4px solid var(--accent-color);
      padding-left: 1rem;
      text-align: left;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-bottom: 5rem;
    }
    .card {
      padding: 2rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .card:hover { 
      transform: translateY(-8px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    .card i { font-size: 2.5rem; color: var(--accent-color); margin-bottom: 1.5rem; }
    .card h3 { margin-bottom: 0.8rem; }
    .card p { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 2rem; flex-grow: 1; line-height: 1.6; }
    
    .badge {
      display: inline-block;
      padding: 0.2rem 0.8rem;
      background: rgba(0, 255, 255, 0.1);
      color: var(--accent-color);
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }
  </style>
  <script type="module">
    import { initProtection } from '/src/js/utils/protection.js';
    initProtection();
  </script>
</head>
<body>
  <!-- Loader -->
  <div id="loader-wrapper">
    <div class="loader-aurora"></div>
    <div class="spinner"></div>
  </div>

  <div class="aurora-bg"></div>

  <div class="portfolio-section">
    <header style="text-align: center; margin-bottom: 6rem;">
      <h1 style="font-size: 3rem; margin-bottom: 1rem;">Mi Portafolio</h1>
      <p style="color: var(--text-secondary); max-width: 600px; margin: 0 auto;">Explora mis herramientas personalizadas, proyectos destacados y mi tienda de plantillas exclusivas.</p>
    </header>

    <!-- Sección Herramientas -->
    <div class="section-title">
      <h2>Herramientas</h2>
    </div>
    <div id="tools-grid" class="grid">
      <!-- Dinámico -->
    </div>

    <!-- Sección Proyectos -->
    <div class="section-title">
      <h2>Proyectos Destacados</h2>
    </div>
    <div id="projects-grid" class="grid">
      <!-- Dinámico -->
    </div>
  </div>

  <nav class="glass floating-nav">
    <a href="/" class="nav-link"><i class="fas fa-home"></i><span>Inicio</span></a>
    <a href="/experiencia/" class="nav-link"><i class="fas fa-history"></i><span>Experiencia</span></a>
    <a href="/portafolio/" class="nav-link active"><i class="fas fa-th-large"></i><span>Portafolio</span></a>
  </nav>

  <footer>
    <div style="text-align: center; padding: 0 0 8rem; color: var(--text-secondary); font-size: 0.8rem;">
      © <span id="year"></span> Eduardo Vázquez
    </div>
  </footer>

  <script type="module">
    async function loadPortfolio() {
      const response = await fetch('/src/data/portfolio.json');
      const data = await response.json();
      
      const toolsGrid = document.getElementById('tools-grid');
      const projectsGrid = document.getElementById('projects-grid');

      const createCard = (item) => {
        const card = document.createElement('div');
        card.className = 'glass card';
        card.innerHTML = `
          <span class="badge">${item.badge}</span>
          <i class="${item.icono}"></i>
          <h3>${item.nombre}</h3>
          <p>${item.descripcion}</p>
          <a href="${item.url}" class="btn-primary" ${item.external ? 'target="_blank"' : ''}>
            ${item.external ? 'Ver en GitHub' : 'Abrir'}
          </a>
        `;
        return card;
      };

      data.herramientas.forEach(item => toolsGrid.appendChild(createCard(item)));
      data.proyectos.forEach(item => projectsGrid.appendChild(createCard(item)));
    }

    window.addEventListener("load", () => {
      const loader = document.getElementById("loader-wrapper");
      loader.style.opacity = "0";
      setTimeout(() => loader.style.visibility = "hidden", 800);
      loadPortfolio();
    });
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
