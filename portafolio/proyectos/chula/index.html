<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para mi Alucin Favorita 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            text-align: center;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 15px;
            color: #d63384;
        }

        /* Pantalla de inicio para activar audio (necesaria para iPhone/Android) */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 154, 158, 0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #start-screen h2 {
            font-size: 2rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .pulse-btn {
            background: #fff;
            color: #ff4081;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Contenido Principal */
        h1 {
            font-size: clamp(2rem, 5vw, 3rem); 
            margin: 0 0 10px 0;
            color: #c2185b;
            text-shadow: 2px 2px 0px #fff;
            line-height: 1.2;
        }

        p {
            font-size: clamp(1rem, 4vw, 1.3rem);
            margin: 5px 0 15px 0;
            color: #880e4f;
            font-weight: 600;
            padding: 0 10px;
        }

        .stickers {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 10px 0;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
            width: 100%;
            height: 80px; 
            position: relative;
        }

        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            white-space: nowrap;
            z-index: 10;
        }

        #yesBtn {
            background-color: #ff4081;
            color: white;
            border: 3px solid #fff;
        }

        #noBtn {
            background-color: #fff;
            color: #ff4081;
            border: 2px solid #ff4081;
            position: relative; 
        }

        /* Clase para mover el botón libremente */
        .moving {
            position: fixed !important; 
        }

        .hidden {
            display: none !important;
        }

        #success-msg {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border: 4px solid #ff4081;
            width: 90%;
            max-width: 400px;
        }

        .alucin-quote {
            font-style: italic;
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="startExperience()">
        <div class="stickers">💌</div>
        <h2>Tienes un mensaje...</h2>
        <div class="pulse-btn">ABRIR 🤠</div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.dropbox.com/scl/fi/yxvqmx8wpnm4wra3b7xsy/Audio-Luis-R-Conriquez-Banda-LR-Pajarillo-Maquillaje-a-Granel.m4a?rlkey=orabhzcbihr1no41t4xukb158&st=f1xicf1x&raw=1" type="audio/mp4">
    </audio>

    <div id="question-screen" class="hidden">
        <div class="stickers">🌻 🤠 🌷</div>
        <h1>Hola, chula hermosa 💅</h1>
        
        <p>¿Quieres ser mi Valentine?</p>
        
        <span class="alucin-quote">"Te amo 3 millones."</span>

        <div class="btn-container">
            <button id="yesBtn" onclick="acceptProposal()">¡Obvio! 💖</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No 🤢</button>
        </div>
    </div>

    <div id="success-msg" class="hidden">
        <h1>¡TRAKAAA! 🥳🔥</h1>
        <div class="stickers">🌷💘🌻</div>
        <p>¡Sabía que no podías resistirte!</p>
        <p>Soy irresistible para ti, jajaja</p>
        <p><strong>Te amo mucho, chula. &lt;3</strong></p>
    </div>

    <script>
        function startExperience() {
            // Ocultar pantalla de inicio
            document.getElementById('start-screen').style.display = 'none';
            // Mostrar pregunta
            document.getElementById('question-screen').classList.remove('hidden');
            document.getElementById('question-screen').style.display = 'block';
            
            // Reproducir el audio de Dropbox
            var audio = document.getElementById('bgMusic');
            audio.volume = 1.0;
            audio.play().catch(error => {
                console.log("Error al reproducir audio:", error);
            });
        }

        // Mover el botón "No"
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;

            const newX = Math.random() * (screenWidth - 100) + 10;
            const newY = Math.random() * (screenHeight - 100) + 10;

            noBtn.classList.add('moving');
            noBtn.style.left = newX + "px";
            noBtn.style.top = newY + "px";
        }

        // Al aceptar
        function acceptProposal() {
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('success-msg').classList.remove('hidden');
            createConfetti();
        }

        // Efecto confeti
        function createConfetti() {
            const colors = ['🌻', '🌷', '💖', '🤠', '✨', '💅'];
            
            setInterval(() => {
                const el = document.createElement('div');
                el.innerText = colors[Math.floor(Math.random() * colors.length)];
                el.style.position = 'fixed';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = '-10vh';
                el.style.fontSize = (Math.random() * 20 + 20) + 'px';
                el.style.zIndex = '9999';
                el.style.transition = 'top 3s linear, opacity 3s ease';
                document.body.appendChild(el);

                setTimeout(() => {
                    el.style.top = '110vh';
                    el.style.opacity = '0';
                }, 100);

                setTimeout(() => el.remove(), 3000);
            }, 200);
        }
    </script>
</body>
</html>
