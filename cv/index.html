<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eduardo Vázquez</title>
  <link rel="icon" type="image/png" href="/img/logo/logo-x.png" />
  <link rel="stylesheet" href="/src/css/base/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .viewer-header {
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--glass-border);
      z-index: 10;
    }
    iframe { flex-grow: 1; border: none; width: 100%; height: 100%; }
    .mobile-fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
      text-align: center;
      padding: 2rem;
    }
    @media (max-width: 768px) {
      iframe { display: none; }
      .mobile-fallback { display: flex; }
    }
  </style>
</head>
<body>
  <div class="aurora-bg"></div>

  <div class="glass viewer-header">
    <a href="/" style="color: var(--text-secondary); text-decoration: none;"><i class="fas fa-arrow-left"></i> Volver</a>
    <h2 style="font-size: 1rem;">Currículum Vítae</h2>
    <a href="/cv.pdf" download class="btn-primary" style="padding: 0.4rem 1rem; font-size: 0.8rem;">
      <i class="fas fa-download"></i> Descargar
    </a>
  </div>

  <!-- Vite sirve cv.pdf desde el root porque publicDir es src/assets -->
  <iframe src="/cv.pdf" title="CV Eduardo Vázquez"></iframe>

  <div class="mobile-fallback">
    <i class="fas fa-file-pdf" style="font-size: 4rem; color: var(--accent-color); margin-bottom: 2rem;"></i>
    <h2>Currículum Vítae</h2>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">Para una mejor lectura en móviles, descarga el archivo PDF directamente.</p>
    <a href="/cv.pdf" class="btn-primary" target="_blank">Abrir en el navegador</a>
    <br>
    <a href="/cv.pdf" download class="btn-primary" style="margin-top: 1rem;">Descargar archivo</a>
  </div>

  <script type="module">
    import { initProtection } from '/src/js/utils/protection.js';
    initProtection();
  </script>
</body>
</html>
